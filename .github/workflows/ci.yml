name: CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxtst-dev libappindicator3-dev xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r requirements.txt || true

      - name: Run tests (Linux with Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a pytest tests/ -v --tb=short || true

      - name: Run tests (Windows/macOS)
        if: runner.os != 'Linux'
        run: pytest tests/ -v --tb=short || true

  build-windows:
    name: Build Windows
    needs: test
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller --noconsole --onefile --name TopMostTool --hidden-import pystray._win32 --icon "assets/icon.ico" --add-data "locales;locales" main.py

      - name: Rename for release
        run: |
          Move-Item -Path dist/TopMostTool.exe -Destination dist/TopMostTool-Windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TopMostTool-Windows
          path: dist/TopMostTool-Windows.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS
    needs: test
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller --noconsole --onefile --name TopMostTool --hidden-import pystray._darwin --hidden-import pynput.keyboard._darwin --add-data "locales:locales" main.py

      - name: Rename for release
        run: |
          mv dist/TopMostTool dist/TopMostTool-macOS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TopMostTool-macOS
          path: dist/TopMostTool-macOS
          if-no-files-found: error

  build-linux:
    name: Build Linux
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxtst-dev libappindicator3-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller --noconsole --onefile --name TopMostTool --hidden-import pystray._gtk --hidden-import pynput.keyboard._xorg --add-data "locales:locales" main.py

      - name: Rename for release
        run: |
          mv dist/TopMostTool dist/TopMostTool-Linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TopMostTool-Linux
          path: dist/TopMostTool-Linux
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TopMostTool-Windows
          path: artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: TopMostTool-macOS
          path: artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: TopMostTool-Linux
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -la artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            artifacts/TopMostTool-Windows.exe
            artifacts/TopMostTool-macOS
            artifacts/TopMostTool-Linux
          generate_release_notes: true
          draft: false
          prerelease: false
